get:
  operationId: getTaskBlockpoints
  summary: get task blockpoints
  parameters:
    - name: task_id
      in: path
      required: true
      schema:
        type: integer
  responses:
    '200':
      description: Got task blockpoints successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TaskBlockpoints.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - blockpoints
post:
  operationId: addBlockpoint
  summary: add blockpoint to task
  parameters:
    - name: task_id
      in: path
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            blocked_by_task_id:
              type: integer
          required:
            - blocked_by_task_id
  responses:
    '201':
      description: Added blockpoint successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - blockpoints
