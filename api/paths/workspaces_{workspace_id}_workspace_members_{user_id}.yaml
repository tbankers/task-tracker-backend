patch:
  operationId: manageMember
  summary: change member role
  parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            role:
              $ref: ../components/schemas/MemberRole.yaml
          required:
            - role
  responses:
    '200':
      description: Changed role successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Member.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - members
delete:
  operationId: kickUser
  summary: delete user from workspace
  parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '204':
      description: Deleted successfully
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - members
