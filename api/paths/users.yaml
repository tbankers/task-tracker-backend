post:
  operationId: createUser
  summary: creating user
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            username:
              type: string
            email:
              type: string
              format: email
            password:
              type: string
          required:
            - username
            - email
            - password
  responses:
    '201':
      description: Succesful user creation
      content:
        application/json:
          schema:
            $ref: ../components/schemas/UserResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - users
get:
  operationId: getUserByEmail
  summary: get user by email
  parameters:
    - name: email
      in: query
      required: true
      schema:
        type: string
        format: email
  responses:
    '200':
      description: Got user successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/UserResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - users
