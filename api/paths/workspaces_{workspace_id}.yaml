get:
  operationId: getUserWorkspaceById
  summary: get workspace by id
  parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Got workspace successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Workspace.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - workspaces
patch:
  operationId: editWorkspace
  summary: edit workspace
  parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            title:
              type: string
  responses:
    '200':
      description: Edited workspace successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Workspace.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - workspaces
delete:
  operationId: deleteWorkspace
  summary: delete workspace
  parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '204':
      description: Deleted successfully
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - workspaces
