get:
  operationId: getWorkspaceBoards
  summary: Получить все доски воркспейса
  parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: success
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Board.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
post:
  operationId: createBoard
  summary: Создать новую доску
  parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name:
              type: string
          required:
            - name
  responses:
    '201':
      description: Доска успешно создана
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Board.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
