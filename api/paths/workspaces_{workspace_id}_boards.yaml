post:
  operationId: createBoard
  summary: create board
  parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            title:
              type: string
          required:
            - title
  responses:
    '201':
      description: Created board successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Board.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - boards
get:
  operationId: getWorkspaceBoards
  summary: get all boards from workspace
  parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Got all boards successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Boards.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - boards
