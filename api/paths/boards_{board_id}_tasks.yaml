post:
  operationId: createTask
  summary: create task
  parameters:
    - name: board_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            title:
              type: string
          required:
            - title
  responses:
    '201':
      description: Created task successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Task.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - tasks
get:
  operationId: getTasksFromBoard
  summary: get all tasks from a board
  parameters:
    - name: board_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Got all board tasks successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Tasks.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - tasks
