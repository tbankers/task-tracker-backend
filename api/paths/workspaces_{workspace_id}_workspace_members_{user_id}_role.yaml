get:
  operationId: getMemberRoleById
  summary: get member role by id
  parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Got member role successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/MemberRole.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - members
