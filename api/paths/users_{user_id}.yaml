patch:
  operationId: changePassword
  summary: changing users password
  parameters:
    - name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/NewPassword.yaml
  responses:
    '200':
      description: Changed the password successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/User.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - users
get:
  operationId: getUserById
  summary: Get user by ID
  parameters:
    - name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Got user successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/User.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
  tags:
    - users
