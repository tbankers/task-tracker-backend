put:
  operationId: updateTask
  summary: Обновить задачу (статус, название, описание)
  parameters:
    - name: task_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            status:
              $ref: ../components/schemas/TaskStatus.yaml
            assigned_id:
              type: string
              format: uuid
              nullable: true
  responses:
    '200':
      description: Задача успешно обновлена
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Task.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
delete:
  operationId: deleteTask
  summary: Удалить задачу
  parameters:
    - name: task_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '204':
      description: Задача успешно удалена
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
