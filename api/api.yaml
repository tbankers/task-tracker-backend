openapi: 3.0.3
info:
  title: Task Tracker API
  version: 1.0.0
  description: task-tracker API.
paths:
  /auth/register:
    $ref: paths/auth_register.yaml
  /auth/login:
    $ref: paths/auth_login.yaml
  /auth/forgot-password:
    $ref: paths/auth_forgotpassword.yaml
  /auth/reset-password:
    $ref: paths/auth_resetpassword.yaml
  /users:
    $ref: paths/users.yaml
  /users/{user_id}:
    $ref: paths/users_{user_id}.yaml
  /users/{user_id}/workspaces:
    $ref: paths/users_{user_id}_workspaces.yaml
  /workspaces:
    $ref: paths/workspaces.yaml
  /workspaces/{workspace_id}:
    $ref: paths/workspaces_{workspace_id}.yaml
  /workspaces/{workspace_id}/workspace_members:
    $ref: paths/workspaces_{workspace_id}_workspace_members.yaml
  /workspaces/{workspace_id}/workspace_members/{user_id}:
    $ref: paths/workspaces_{workspace_id}_workspace_members_{user_id}.yaml
  /workspaces/{workspace_id}/workspace_members/{user_id}/role:
    $ref: paths/workspaces_{workspace_id}_workspace_members_{user_id}_role.yaml
  /workspaces/{workspace_id}/boards:
    $ref: paths/workspaces_{workspace_id}_boards.yaml
  /boards/{board_id}:
    $ref: paths/boards_{board_id}.yaml
  /boards/{board_id}/columns:
    $ref: paths/boards_{board_id}_columns.yaml
  get:
    $ref: paths/get.yaml
  post:
    $ref: paths/post.yaml
components:
  schemas:
    RegisterRequest:
      $ref: components/schemas/RegisterRequest.yaml
    UserResponse:
      $ref: components/schemas/UserResponse.yaml
    LoginResponse:
      $ref: components/schemas/LoginResponse.yaml
    ErrorResponse:
      $ref: components/schemas/ErrorResponse.yaml
    LoginRequest:
      $ref: components/schemas/LoginRequest.yaml
    ForgotPasswordRequest:
      $ref: components/schemas/ForgotPasswordRequest.yaml
    ResetPasswordRequest:
      $ref: components/schemas/ResetPasswordRequest.yaml
    NewPassword:
      $ref: components/schemas/NewPassword.yaml
    Workspace:
      $ref: components/schemas/Workspace.yaml
    Workspaces:
      $ref: components/schemas/Workspaces.yaml
    MemberRole:
      $ref: components/schemas/MemberRole.yaml
    Member:
      $ref: components/schemas/Member.yaml
    Board:
      $ref: components/schemas/Board.yaml
    Boards:
      $ref: components/schemas/Boards.yaml
    Column:
      $ref: components/schemas/Column.yaml
  properties:
    id:
      $ref: components/properties/id.yaml
    board_id:
      $ref: components/properties/board_id.yaml
    name:
      $ref: components/properties/name.yaml
    position:
      $ref: components/properties/position.yaml
    created_at:
      $ref: components/properties/created_at.yaml
    Task:
      $ref: components/properties/Task.yaml
    Tasks:
      $ref: components/properties/Tasks.yaml
    TaskBlockpoints:
      $ref: components/properties/TaskBlockpoints.yaml
  responses:
    BadRequest:
      $ref: components/responses/BadRequest.yaml
    InternalServerError:
      $ref: components/responses/InternalServerError.yaml
    NotFound:
      $ref: components/responses/NotFound.yaml
  type: object
/columns/{column_id}:
  delete:
    operationId: deleteColumn
    summary: Delete a column
    parameters:
      - name: column_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Deleted
/columns/{column_id}/tasks:
  get:
    operationId: getColumnTasks
    summary: Get tasks in a column
    parameters:
      - name: column_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: success
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Task'
  post:
    operationId: createTask
    summary: Create a task in a column
    parameters:
      - name: column_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              assigned_id:
                type: string
                format: uuid
                nullable: true
            required:
              - name
    responses:
      '201':
        description: Task created
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
  /tasks/{task_id}:
    patch:
      operationId: changeTaskStatus
      summary: change task status
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json: null
        schema:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            column_id:
              type: string
              format: uuid
            assigned_id:
              type: string
              format: uuid
              nullable: true
      responses:
        '200':
          description: Changed task status successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - tasks
    delete:
      operationId: deleteTask
      summary: delete task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted task successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - tasks
  /tasks/{task_id}/blockpoints:
    get:
      operationId: getTaskBlockpoints
      summary: get task blockpoints
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Got task blockpoints successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskBlockpoints'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - blockpoints
    post:
      operationId: addBlockpoint
      summary: add blockpoint to task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                blocked_by_task_id:
                  type: integer
              required:
                - blocked_by_task_id
      responses:
        '201':
          description: Added blockpoint successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - blockpoints
  /tasks/{task_id}/blockpoints/{blocked_by_task_id}:
    delete:
      operationId: removeBlockpoint
      summary: remove blockpoint from task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
        - name: blocked_by_task_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Removed blockpoint successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - blockpoints
