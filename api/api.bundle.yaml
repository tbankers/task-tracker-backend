openapi: 3.0.3
info:
  title: Task Tracker API
  version: 1.0.0
  description: task-tracker API.
paths:
  /users:
    post:
      summary: creating user
      operationId: createUser
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '201':
          description: Succesful user creation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: get user by email
      operationId: getUserByEmail
      tags:
        - users
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Got user successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /users/{user_id}:
    patch:
      summary: changing users password
      operationId: changePassword
      tags:
        - users
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPassword'
      responses:
        '200':
          description: Changed the password successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: Get user by ID
      operationId: getUserById
      tags:
        - users
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Got user successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /users/{user_id}/workspaces:
    get:
      summary: get all users workspaces
      operationId: getUserWorkspace
      tags:
        - workspaces
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Got all workspaces successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspaces'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /workspaces:
    post:
      summary: creates workspace
      operationId: createWorkspace
      tags:
        - workspaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
      responses:
        '201':
          description: Created workspace successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /workspaces/{workspace_id}:
    get:
      summary: get workspace by id
      operationId: getUserWorkspaceById
      tags:
        - workspaces
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Got workspace successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: edit workspace
      operationId: editWorkspace
      tags:
        - workspaces
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
      responses:
        '200':
          description: Edited workspace successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: delete workspace
      operationId: deleteWorkspace
      tags:
        - workspaces
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /workspaces/{workspace_id}/workspace_members:
    post:
      summary: add member to workspace
      operationId: addMember
      tags:
        - members
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: string
                  format: uuid
                role:
                  $ref: '#/components/schemas/MemberRole'
      responses:
        '201':
          description: Added member successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /workspaces/{workspace_id}/workspace_members/{user_id}:
    patch:
      summary: change member role
      operationId: manageMember
      tags:
        - members
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: '#/components/schemas/MemberRole'
      responses:
        '200':
          description: Changed role successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: delete user from workspace
      operationId: kickUser
      tags:
        - members
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /workspaces/{workspace_id}/workspace_members/{user_id}/role:
    get:
      summary: get member role by id
      operationId: getMemberRoleById
      tags:
        - members
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Got member role successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberRole'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /workspaces/{workspace_id}/boards:
    post:
      summary: create board
      operationId: createBoard
      tags:
        - boards
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
      responses:
        '201':
          description: Created board successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: get all boards from workspace
      operationId: getWorkspaceBoards
      tags:
        - boards
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Got all boards successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Boards'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /boards/{board_id}:
    patch:
      summary: Edit board
      operationId: editBoard
      tags:
        - boards
      parameters:
        - name: board_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
      responses:
        '200':
          description: Edited board successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: delete board
      operationId: deleteBoard
      tags:
        - boards
      parameters:
        - name: board_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204': 
          description: Deleted board successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /boards/{board_id}/tasks:
    post:
      summary: create task
      operationId: createTask
      tags:
        - tasks
      parameters:
        - name: board_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
      responses:
        '201':
          description: Created task successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: get all tasks from a board
      operationId: getTasksFromBoard
      tags:
        - tasks
      parameters:
        - name: board_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Got all board tasks successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tasks'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /tasks/{task_id}:
    patch:
      summary: change task status
      operationId: changeTaskStatus
      tags:
        - tasks
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/TaskStatus'
      responses:
        '200':
          description: Changed task status successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: delete task
      operationId: deleteTask
      tags:
        - tasks
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted task successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  schemas:
    UserResponse:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
        created_at:
          type: string
          format: date-time
    NewPassword:
      type: object
      required: [password]
      properties:
        password:
          type: string
          format: password
          description: "new raw or hashed user password"
    Workspaces:
      type: array
      items:
        $ref: '#/components/schemas/Workspace'
    Workspace:
      type: object
      properties:
        workspace_id:
          type: string
          format: uuid
        title:
          type: string
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
    Member:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/MemberRole'
    Board:
      type: object
      properties:
        board_id:
          type: string
          format: uuid
        title:
          type: string
        workspace_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
          nullable: true
    Boards:
      type: array
      items:
        $ref: '#/components/schemas/Board'
    TaskStatus:
      type: string
      enum:
        - to_do
        - in_progress
        - done
    MemberRole:
      type: string
      enum:
        - guest
        - member
        - administrator
    Task:
      type: object
      properties:
        task_id:
          type: string
          format: uuid
        board_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/TaskStatus'
        assigned_id:
          type: string
          format: uuid
          nullable: true
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Tasks:
      type: array
      items:
        $ref: '#/components/schemas/Task'
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: INVALID_UUID
        message:
          type: string
          example: The provided string is not a valid UUID
      required:
        - code
        - message
  responses:
    BadRequest:
      description: Невалидные входные данные или неверный формат UUID
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Ресурс не найден в базе данных
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Внутренняя ошибка сервера при работе с БД
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'