get:
  operationId: getBoardTasks
  summary: Получить все задачи на доске
  parameters:
    - name: board_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Список задач успешно получен
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Task.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
post:
  operationId: createTask
  summary: Создать новую задачу на доске
  parameters:
    - name: board_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            assigned_id:
              type: string
              format: uuid
              nullable: true
          required:
            - name
  responses:
    '201':
      description: Задача успешно создана
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Task.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
