<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Tracker API Tester</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 20px; }
h1 { text-align: center; margin-bottom: 20px; color: #4fc3f7; }
h2 { color: #81d4fa; margin: 20px 0 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
.section { background: #1a1a1a; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
.row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
input, select { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 4px; font-size: 14px; }
input:focus, select:focus { outline: none; border-color: #4fc3f7; }
button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity .2s; }
button:hover { opacity: .85; }
.btn-blue { background: #1976d2; color: #fff; }
.btn-green { background: #388e3c; color: #fff; }
.btn-orange { background: #f57c00; color: #fff; }
.btn-red { background: #d32f2f; color: #fff; }
.btn-purple { background: #7b1fa2; color: #fff; }
.btn-grey { background: #555; color: #fff; }
#log { background: #111; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-top: 20px; max-height: 500px; overflow-y: auto; font-family: 'Fira Code', monospace; font-size: 13px; }
.log-entry { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #222; }
.log-method { font-weight: bold; }
.log-method.GET { color: #4fc3f7; }
.log-method.POST { color: #81c784; }
.log-method.PATCH { color: #ffb74d; }
.log-method.DELETE { color: #ef5350; }
.log-status { font-weight: bold; margin-left: 8px; }
.log-status.ok { color: #81c784; }
.log-status.err { color: #ef5350; }
.log-url { color: #aaa; }
.log-body { color: #888; margin-top: 4px; white-space: pre-wrap; word-break: break-all; }
.token-display { background: #222; padding: 8px 12px; border-radius: 4px; word-break: break-all; margin: 8px 0; font-family: monospace; font-size: 12px; color: #81c784; }
#token { color: #81c784; }
</style>
</head>
<body>
<h1>Task Tracker API Tester</h1>

<div class="section">
<h2>Auth</h2>
<div class="row">
  <input id="reg-email" placeholder="email" type="email">
  <input id="reg-username" placeholder="username">
  <input id="reg-password" placeholder="password" type="password">
  <button class="btn-green" onclick="doRegister()">Register</button>
</div>
<div class="row">
  <input id="login-email" placeholder="email" type="email">
  <input id="login-password" placeholder="password" type="password">
  <button class="btn-blue" onclick="doLogin()">Login</button>
</div>
<div class="row">
  <input id="forgot-email" placeholder="email" type="email">
  <button class="btn-orange" onclick="doForgotPassword()">Forgot Password</button>
</div>
<div class="row">
  <input id="reset-token" placeholder="reset token">
  <input id="reset-new-password" placeholder="new password" type="password">
  <button class="btn-orange" onclick="doResetPassword()">Reset Password</button>
</div>
<div>Token: <span id="token">not set</span></div>
</div>

<div class="section">
<h2>Users</h2>
<div class="row">
  <input id="user-email" placeholder="email" type="email">
  <button class="btn-blue" onclick="doGetUserByEmail()">Get by Email</button>
</div>
<div class="row">
  <input id="user-id" placeholder="user_id (uuid)">
  <button class="btn-blue" onclick="doGetUserById()">Get by ID</button>
</div>
<div class="row">
  <input id="change-pw-user-id" placeholder="user_id">
  <input id="change-pw-new" placeholder="new password" type="password">
  <button class="btn-orange" onclick="doChangePassword()">Change Password</button>
</div>
</div>

<div class="section">
<h2>Workspaces</h2>
<div class="row">
  <input id="ws-title" placeholder="title">
  <button class="btn-green" onclick="doCreateWorkspace()">Create</button>
</div>
<div class="row">
  <input id="ws-list-user-id" placeholder="user_id">
  <button class="btn-blue" onclick="doGetUserWorkspaces()">List User Workspaces</button>
</div>
<div class="row">
  <input id="ws-id" placeholder="workspace_id">
  <button class="btn-blue" onclick="doGetWorkspace()">Get</button>
  <button class="btn-orange" onclick="doEditWorkspace()">Edit</button>
  <button class="btn-red" onclick="doDeleteWorkspace()">Delete</button>
</div>
<div class="row">
  <input id="ws-edit-title" placeholder="new title">
</div>
</div>

<div class="section">
<h2>Boards</h2>
<div class="row">
  <input id="board-ws-id" placeholder="workspace_id">
  <input id="board-title" placeholder="title">
  <button class="btn-green" onclick="doCreateBoard()">Create</button>
</div>
<div class="row">
  <input id="board-list-ws-id" placeholder="workspace_id">
  <button class="btn-blue" onclick="doGetBoards()">List</button>
</div>
<div class="row">
  <input id="board-id" placeholder="board_id">
  <button class="btn-orange" onclick="doEditBoard()">Edit</button>
  <button class="btn-red" onclick="doDeleteBoard()">Delete</button>
</div>
<div class="row">
  <input id="board-edit-title" placeholder="new title">
</div>
</div>

<div class="section">
<h2>Tasks</h2>
<div class="row">
  <input id="task-board-id" placeholder="board_id">
  <input id="task-title" placeholder="title">
  <button class="btn-green" onclick="doCreateTask()">Create</button>
</div>
<div class="row">
  <input id="task-list-board-id" placeholder="board_id">
  <button class="btn-blue" onclick="doGetTasks()">List</button>
</div>
<div class="row">
  <input id="task-id" placeholder="task_id">
  <select id="task-status">
    <option value="to_do">to_do</option>
    <option value="in_progress">in_progress</option>
    <option value="done">done</option>
  </select>
  <button class="btn-orange" onclick="doChangeTaskStatus()">Change Status</button>
  <button class="btn-red" onclick="doDeleteTask()">Delete</button>
</div>
</div>

<div class="section">
<h2>Members</h2>
<div class="row">
  <input id="member-ws-id" placeholder="workspace_id">
  <input id="member-user-id" placeholder="user_id">
  <select id="member-role">
    <option value="member">member</option>
    <option value="administrator">administrator</option>
    <option value="guest">guest</option>
  </select>
  <button class="btn-green" onclick="doAddMember()">Add</button>
</div>
<div class="row">
  <input id="member-get-ws-id" placeholder="workspace_id">
  <input id="member-get-user-id" placeholder="user_id">
  <button class="btn-blue" onclick="doGetMemberRole()">Get Role</button>
</div>
<div class="row">
  <input id="member-manage-ws-id" placeholder="workspace_id">
  <input id="member-manage-user-id" placeholder="user_id">
  <select id="member-manage-role">
    <option value="member">member</option>
    <option value="administrator">administrator</option>
    <option value="guest">guest</option>
  </select>
  <button class="btn-orange" onclick="doManageMember()">Change Role</button>
</div>
<div class="row">
  <input id="member-kick-ws-id" placeholder="workspace_id">
  <input id="member-kick-user-id" placeholder="user_id">
  <button class="btn-red" onclick="doKickMember()">Kick</button>
</div>
</div>

<div id="log"><div style="color:#666;text-align:center">API calls will appear here...</div></div>

<script>
const API = '';
let token = '';

function setToken(t) {
  token = t;
  document.getElementById('token').textContent = t ? t.substring(0, 50) + '...' : 'not set';
}

function log(method, url, status, body, response) {
  const el = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  const statusClass = status >= 200 && status < 400 ? 'ok' : 'err';
  const ts = new Date().toLocaleTimeString();
  entry.innerHTML = `<span style="color:#666">[${ts}]</span> <span class="log-method ${method}">${method}</span> <span class="log-url">${url}</span> <span class="log-status ${statusClass}">${status}</span>`;
  if (body) entry.innerHTML += `<div class="log-body">→ ${typeof body === 'string' ? body : JSON.stringify(body)}</div>`;
  if (response) entry.innerHTML += `<div class="log-body">← ${typeof response === 'string' ? response : JSON.stringify(response, null, 2)}</div>`;
  el.prepend(entry);
}

async function api(method, path, body) {
  const url = API + path;
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(url, opts);
    const text = await res.text();
    let json;
    try { json = JSON.parse(text); } catch { json = text; }
    log(method, path, res.status, body, json);
    return json;
  } catch (e) {
    log(method, path, 'ERR', body, e.message);
    return null;
  }
}

async function doRegister() {
  const r = await api('POST', '/auth/register', {
    email: document.getElementById('reg-email').value,
    username: document.getElementById('reg-username').value,
    password: document.getElementById('reg-password').value
  });
  if (r && r.token) setToken(r.token);
}

async function doLogin() {
  const r = await api('POST', '/auth/login', {
    email: document.getElementById('login-email').value,
    password: document.getElementById('login-password').value
  });
  if (r && r.token) setToken(r.token);
}

async function doForgotPassword() {
  await api('POST', '/auth/forgot-password', { email: document.getElementById('forgot-email').value });
}

async function doResetPassword() {
  await api('POST', '/auth/reset-password', {
    token: document.getElementById('reset-token').value,
    new_password: document.getElementById('reset-new-password').value
  });
}

async function doGetUserByEmail() {
  await api('GET', '/users?email=' + encodeURIComponent(document.getElementById('user-email').value));
}

async function doGetUserById() {
  await api('GET', '/users/' + document.getElementById('user-id').value);
}

async function doChangePassword() {
  await api('PATCH', '/users/' + document.getElementById('change-pw-user-id').value, {
    password: document.getElementById('change-pw-new').value
  });
}

async function doCreateWorkspace() {
  await api('POST', '/workspaces', { title: document.getElementById('ws-title').value });
}

async function doGetUserWorkspaces() {
  await api('GET', '/users/' + document.getElementById('ws-list-user-id').value + '/workspaces');
}

async function doGetWorkspace() {
  await api('GET', '/workspaces/' + document.getElementById('ws-id').value);
}

async function doEditWorkspace() {
  const title = document.getElementById('ws-edit-title').value;
  await api('PATCH', '/workspaces/' + document.getElementById('ws-id').value, { title });
}

async function doDeleteWorkspace() {
  await api('DELETE', '/workspaces/' + document.getElementById('ws-id').value);
}

async function doCreateBoard() {
  await api('POST', '/workspaces/' + document.getElementById('board-ws-id').value + '/boards', {
    title: document.getElementById('board-title').value
  });
}

async function doGetBoards() {
  await api('GET', '/workspaces/' + document.getElementById('board-list-ws-id').value + '/boards');
}

async function doEditBoard() {
  const title = document.getElementById('board-edit-title').value;
  await api('PATCH', '/boards/' + document.getElementById('board-id').value, { title });
}

async function doDeleteBoard() {
  await api('DELETE', '/boards/' + document.getElementById('board-id').value);
}

async function doCreateTask() {
  await api('POST', '/boards/' + document.getElementById('task-board-id').value + '/tasks', {
    title: document.getElementById('task-title').value
  });
}

async function doGetTasks() {
  await api('GET', '/boards/' + document.getElementById('task-list-board-id').value + '/tasks');
}

async function doChangeTaskStatus() {
  await api('PATCH', '/tasks/' + document.getElementById('task-id').value, {
    status: document.getElementById('task-status').value
  });
}

async function doDeleteTask() {
  await api('DELETE', '/tasks/' + document.getElementById('task-id').value);
}

async function doAddMember() {
  await api('POST', '/workspaces/' + document.getElementById('member-ws-id').value + '/workspace_members', {
    user_id: document.getElementById('member-user-id').value,
    role: document.getElementById('member-role').value
  });
}

async function doGetMemberRole() {
  await api('GET', '/workspaces/' + document.getElementById('member-get-ws-id').value + '/workspace_members/' + document.getElementById('member-get-user-id').value + '/role');
}

async function doManageMember() {
  await api('PATCH', '/workspaces/' + document.getElementById('member-manage-ws-id').value + '/workspace_members/' + document.getElementById('member-manage-user-id').value, {
    role: document.getElementById('member-manage-role').value
  });
}

async function doKickMember() {
  await api('DELETE', '/workspaces/' + document.getElementById('member-kick-ws-id').value + '/workspace_members/' + document.getElementById('member-kick-user-id').value);
}
</script>
</body>
</html>
